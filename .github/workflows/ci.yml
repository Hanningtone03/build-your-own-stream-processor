name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Compile
        run: javac -d out src/main/java/stream/operators/*.java src/main/java/stream/*.java
      - name: Run
        run: java -cp out stream.Main